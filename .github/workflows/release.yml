name: Release

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      release_tag:
        description: Tag to publish, for example v0.1.1
        required: true
        type: string
      npm_dist_tag:
        description: npm dist-tag to publish under
        required: true
        default: latest
        type: choice
        options:
          - latest
          - next

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: combox

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout requested release tag
        if: github.event_name == 'workflow_dispatch'
        run: |
          git fetch --force --tags origin "refs/tags/${{ inputs.release_tag }}:refs/tags/${{ inputs.release_tag }}"
          git checkout "refs/tags/${{ inputs.release_tag }}"

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Validate npm token
        run: |
          if [ -z "${{ secrets.NPM_TOKEN }}" ]; then
            echo "Missing required secret: NPM_TOKEN"
            echo "Create an npm access token with publish rights for the combox-api package."
            exit 1
          fi

      - name: Install
        run: npm ci

      - name: Type check
        run: npm run check

      - name: Build
        run: npm run build

      - name: Verify release version matches package.json
        run: |
          node -e "const pkg=require('./package.json'); const tag=process.env.RELEASE_TAG; const expected='v'+pkg.version; if (expected !== tag) { console.error('Release tag ' + tag + ' does not match package.json version ' + expected); process.exit(1); }"
        env:
          RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.event.release.tag_name }}

      - name: Publish package
        run: |
          if [ "${NPM_DIST_TAG}" = "latest" ]; then
            npm publish
          else
            npm publish --tag "${NPM_DIST_TAG}"
          fi
        env:
          NPM_DIST_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.npm_dist_tag || (github.event.release.prerelease && 'next' || 'latest') }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
